name: Bug report
description: Report something broken, unclear, or unsafe.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect instead?
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: Architecture or module
      description: Which architecture or module is involved?
      placeholder: evidence-review, decision-prep, artifact-trust-layer
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste output from `python3 scripts/setup_state.py doctor --json` if relevant.
      render: json
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, customer data, or private business data.
          required: true
